# SAP_9001 设备配置文件
# 格式: [section] key = value
# 注释行以 # 开头

[device]
id = FF
net_id = 0000

[network.wifi]
server_ip = 192.168.3.1
server_port = 1234

[network.lan]
server_ip = 192.168.2.1
server_port = 2234
local_ip = 192.168.2.235
zd_server_ip = 192.168.31.101
zd_server_port = 3234
zd_local_ip = 192.168.31.101

[network.cell4g]
server_ip = 106.52.84.156
server_port = 8888
apn = vnet.mobi
pppd_script = /home/root/g2020/mokuai/4g/ppp/ppp/quectel-pppd.sh
pppd_device = /dev/ttyUSB5
pppd_kill = /home/root/g2020/mokuai/4g/ppp/ppp/quectel-ppp-kill

[network.esp8266]
ssid = g202001
password = 12345678
tcp_port = 8080
udp_broadcast = 192.168.4.255
udp_port = 2345

[serial.lora]
port = /dev/tong_lora
baudrate = 115200

[serial.wifi]
port = /dev/tong_wifi
baudrate = 115200

[serial.bluetooth]
port = /dev/tong_bt
baudrate = 115200

[serial.cell4g]
port = /dev/tong_4g
baudrate = 115200

[serial.gps]
port = /dev/ttymxc7
baudrate = 9600

[serial.rs485_a]
port = /dev/ttymxc2
baudrate = 9600

[serial.rs485_b]
port = /dev/ttymxc2
baudrate = 9600

[serial.rs485_c]
port = /dev/ttymxc4
baudrate = 9600

[serial.rs232]
port = /dev/ttymxc3
baudrate = 9600

[sensor.ship]
port = /dev/ttymxc2
baudrate = 9600
st = 26
hj_password = 123456
flag = 4

[sensor.gas]
port = /dev/ttymxc2
baudrate = 9600
st = 31
hj_password = 123456
flag = 4

[watchdog]
pid_file = /home/root/myWatch.txt
timeout_sec = 30
monitor_interval_sec = 4
register_timeout_sec = 60

[data]
store_file = /home/root/storefile.txt
mac_file = ./mac.txt
mn_file = ./hj_mn.txt

[paths]
power_script = ./power_12v.sh
wifi_conf = /home/root/wifi.conf
bt_open_script = /home/root/jd_open.sh
bt_close_script = /home/root/jd_close.sh
gps_script = /home/root/gps_test.sh
led_red = /sys/class/leds/red/brightness
led_yellow = /sys/class/leds/yellow/brightness
led_green = /sys/class/leds/green/brightness

[timeouts]
connect_sec = 3
